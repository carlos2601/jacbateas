<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC Bateas · Inicio de Sesion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: rgba(30, 41, 59, 0.8);
            --accent-green: #10b981;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --accent-gold: #b68b40;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-logo {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            animation: logoPulse 2s ease-in-out infinite;
        }

        .loading-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.4));
        }

        .loading-text {
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            animation: textPulse 1.5s ease-in-out infinite;
        }

        .loading-bar {
            width: 200px;
            height: 3px;
            background: var(--bg-secondary);
            border-radius: 3px;
            margin-top: 16px;
            overflow: hidden;
        }

        .loading-bar::after {
            content: '';
            display: block;
            width: 50%;
            height: 100%;
            background: var(--accent-green);
            border-radius: 3px;
            animation: loadingBar 1.2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        @keyframes textPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes loadingBar {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }

        /* ===== CONTAINER ===== */
        .login-container {
            max-width: 420px;
            width: 100%;
        }

        /* ===== CARD ===== */
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            text-align: center;
            animation: cardFadeIn 0.6s ease-out;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== LOGO ===== */
        .logo {
            width: 90px;
            height: 90px;
            margin: 0 auto 16px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--accent-green);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-weight: 800;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* ===== INPUTS ===== */
        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            font-size: 0.9rem;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .input-group input::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .input-group input:focus {
            border-color: var(--accent-green);
            outline: none;
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        /* ===== BUTTONS ===== */
        .btn-login {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-login:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
        }

        .btn-login:disabled {
            background: var(--text-secondary);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== ALERTS ===== */
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: none;
        }

        .alert.show {
            display: block;
            animation: alertSlide 0.3s ease-out;
        }

        @keyframes alertSlide {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-red);
            border-left: 4px solid var(--accent-red);
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border-left: 4px solid var(--accent-green);
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.65rem;
            font-weight: 500;
        }

        /* ===== LOADING SPINNER ===== */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== MENU ===== */
        .menu-card { display: none; }
        .menu-card.show { display: block; }
        .login-card.hidden { display: none; }

        .menu-title {
            font-size: 1.3rem;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-weight: 800;
        }

        .menu-user {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 20px;
            background: var(--bg-secondary);
            padding: 10px 16px;
            border-radius: 12px;
            display: inline-block;
            border: 1px solid var(--border-color);
        }

        .menu-user span {
            font-weight: 700;
            color: var(--accent-green);
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .menu-btn:hover {
            background: rgba(16, 185, 129, 0.1);
            border-color: var(--accent-green);
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .menu-btn .icon {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .menu-btn .icon.treasury { background: rgba(16, 185, 129, 0.15); }
        .menu-btn .icon.expenses { background: rgba(239, 68, 68, 0.15); }
        .menu-btn .icon.reports { background: rgba(59, 130, 246, 0.15); }
        .menu-btn .icon.admin { background: rgba(245, 158, 11, 0.15); }

        .menu-btn .info { flex: 1; }
        .menu-btn .info .name { font-size: 0.9rem; font-weight: 700; color: var(--text-primary); }
        .menu-btn .info .desc { font-size: 0.65rem; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }
        .menu-btn .arrow { font-size: 1.1rem; color: var(--text-secondary); }

        .btn-logout {
            background: none;
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            width: 100%;
            margin-top: 14px;
            transition: all 0.15s;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.1);
            border-color: var(--accent-red);
            color: var(--accent-red);
        }

        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
        }
    </style>
</head>

<body>
    <!-- LOADING SCREEN -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Escudo_Acci%C3%B3n_Comunal_Colombia.svg/500px-Escudo_Acci%C3%B3n_Comunal_Colombia.svg.png" alt="Logo">
        </div>
        <p class="loading-text">Cargando sistema...</p>
        <div class="loading-bar"></div>
    </div>

    <div class="login-container">
        <!-- TARJETA DE LOGIN -->
        <div class="login-card" id="loginCard">
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Escudo_Acci%C3%B3n_Comunal_Colombia.svg/500px-Escudo_Acci%C3%B3n_Comunal_Colombia.svg.png" alt="Escudo">
            </div>
            <h1>JAC Bateas</h1>
            <div class="subtitle">
                Sistema de Recaudo<br>
                Barrio Bateas Sector 3 · Puerto Gaitan, Meta
            </div>

            <div id="alertMessage" class="alert"></div>

            <div class="input-group">
                <label>USUARIO</label>
                <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="off">
            </div>

            <div class="input-group">
                <label>CONTRASENA</label>
                <input type="password" id="password" placeholder="Ingresa tu contrasena">
            </div>

            <button id="loginBtn" class="btn-login">Iniciar sesion</button>

            <div class="footer">
                Junta de Accion Comunal · Barrio Bateas Sector 3 · 2026
            </div>
        </div>

        <!-- TARJETA DE MENU -->
        <div class="login-card menu-card" id="menuCard">
            <div class="logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/51/Escudo_Acci%C3%B3n_Comunal_Colombia.svg/500px-Escudo_Acci%C3%B3n_Comunal_Colombia.svg.png" alt="Escudo">
            </div>
            <h1 class="menu-title">JAC Bateas</h1>
            <div class="menu-user">
                Sesion: <span id="menuUsername"></span> |
                Rol: <span id="menuRol"></span>
            </div>

            <div class="menu-options">
                <button class="menu-btn" id="goToTreasuryBtn">
                    <div class="icon treasury">💰</div>
                    <div class="info">
                        <div class="name">Tesoreria · Recaudos</div>
                        <div class="desc">Registrar pagos de cuotas y certificados</div>
                    </div>
                    <div class="arrow">→</div>
                </button>

                <button class="menu-btn" id="goToExpensesBtn">
                    <div class="icon expenses">💸</div>
                    <div class="info">
                        <div class="name">Control de Gastos</div>
                        <div class="desc">Registrar y controlar los gastos de la JAC</div>
                    </div>
                    <div class="arrow">→</div>
                </button>

                <button class="menu-btn" id="goToReportsBtn" style="display: none;">
                    <div class="icon reports">📊</div>
                    <div class="info">
                        <div class="name">Informes</div>
                        <div class="desc">Ver reportes y estadisticas</div>
                    </div>
                    <div class="arrow">→</div>
                </button>

                <button class="menu-btn" id="goToAdminBtn" style="display: none;">
                    <div class="icon admin">⚙️</div>
                    <div class="info">
                        <div class="name">Administracion</div>
                        <div class="desc">Gestionar tokens, usuarios y configuracion</div>
                    </div>
                    <div class="arrow">→</div>
                </button>
            </div>

            <button class="btn-logout" id="logoutBtn">Cerrar sesion</button>

            <div class="footer">
                Junta de Accion Comunal · Barrio Bateas Sector 3 · 2026
            </div>
        </div>
    </div>

    <script>
        // Configuracion
        const USUARIOS_URL = "https://raw.githubusercontent.com/carlos2601/juntadeaccioncomunalbarriobateaspuertogaitanmetalilianalondo-ogallego1010101010101000111010001010010/refs/heads/main/usuarios.json";

        // Loading screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 1500);
        });

        // Elementos DOM
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alertMessage = document.getElementById('alertMessage');
        const loginCard = document.getElementById('loginCard');
        const menuCard = document.getElementById('menuCard');
        const menuUsername = document.getElementById('menuUsername');
        const menuRol = document.getElementById('menuRol');

        // Mostrar alertas
        function mostrarAlerta(mensaje, tipo = 'error') {
            alertMessage.textContent = mensaje;
            alertMessage.className = `alert show alert-${tipo}`;
            setTimeout(() => {
                alertMessage.classList.remove('show');
            }, 5000);
        }

        // Validar credenciales contra GitHub
        async function validarUsuario(username, password) {
            try {
                loginBtn.innerHTML = '<span class="loading"></span> Verificando...';
                loginBtn.disabled = true;

                const response = await fetch(USUARIOS_URL);
                if (!response.ok) throw new Error('No se pudo conectar con el servidor');

                const data = await response.json();
                console.log('Datos recibidos:', data);

                if (!data || !data.usuarios || !Array.isArray(data.usuarios)) {
                    throw new Error('Error en la estructura de datos de usuarios');
                }

                const usuario = data.usuarios.find(u => {
                    if (!u || typeof u.usuario !== 'string' || typeof u.password !== 'string') return false;
                    return u.usuario.toLowerCase() === username.toLowerCase() &&
                        u.password === password &&
                        u.activo === true;
                });

                if (!usuario) throw new Error('Usuario o contrasena incorrectos');
                return usuario;

            } catch (error) {
                throw error;
            } finally {
                loginBtn.innerHTML = 'Iniciar sesion';
                loginBtn.disabled = false;
            }
        }

        // Mostrar menu de seleccion
        function mostrarMenu(usuario) {
            loginCard.classList.add('hidden');
            menuCard.classList.add('show');

            menuUsername.textContent = usuario.usuario;
            menuRol.textContent = usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);

            const goToTreasuryBtn = document.getElementById('goToTreasuryBtn');
            const goToExpensesBtn = document.getElementById('goToExpensesBtn');
            const goToReportsBtn = document.getElementById('goToReportsBtn');
            const goToAdminBtn = document.getElementById('goToAdminBtn');

            if (usuario.rol === 'revisor' || (usuario.permisos && usuario.permisos.solo_informes)) {
                goToTreasuryBtn.style.display = 'none';
                goToExpensesBtn.style.display = 'none';
                goToReportsBtn.style.display = 'flex';
            } else {
                goToTreasuryBtn.style.display = 'flex';
                goToExpensesBtn.style.display = 'flex';
                goToReportsBtn.style.display = 'none';
            }

            if (usuario.rol === 'admin') {
                goToAdminBtn.style.display = 'flex';
            }
        }

        // Navegar a un modulo
        function navegarA(modulo, usuario) {
            const sessionToken = sessionStorage.getItem('session_token');
            let url = '';

            switch (modulo) {
                case 'tesoreria':
                    if (usuario.rol === 'tesorera') {
                        url = `tesoreria.html?mode=full&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    } else {
                        url = `tesoreria.html?mode=readonly&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    }
                    break;
                case 'gastos':
                    url = `gastos.html?mode=full&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    break;
                case 'informes':
                    url = `informes.html?mode=readonly&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    break;
                case 'admin':
                    url = `admin.html?user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    break;
                default:
                    url = `tesoreria.html?mode=full&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
            }

            window.location.href = url;
        }

        // Redirigir segun rol y permisos
        function redirigirSegunRol(usuario) {
            sessionStorage.setItem('usuario_actual', JSON.stringify({
                usuario: usuario.usuario,
                rol: usuario.rol,
                permisos: usuario.permisos,
                activo: usuario.activo,
                fecha_registro: usuario.fecha_registro
            }));

            const sessionToken = btoa(`${usuario.usuario}:${Date.now()}`);
            sessionStorage.setItem('session_token', sessionToken);

            mostrarAlerta(`Bienvenido ${usuario.usuario}!`, 'success');

            setTimeout(() => {
                mostrarMenu(usuario);
            }, 500);
        }

        // Evento de login
        loginBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                mostrarAlerta('Por favor ingresa usuario y contrasena', 'error');
                return;
            }

            try {
                const usuario = await validarUsuario(username, password);
                redirigirSegunRol(usuario);
            } catch (error) {
                mostrarAlerta(error.message, 'error');
            }
        });

        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') passwordInput.focus();
        });

        // Eventos del menu
        document.getElementById('goToTreasuryBtn').addEventListener('click', () => {
            navegarA('tesoreria', JSON.parse(sessionStorage.getItem('usuario_actual') || '{}'));
        });

        document.getElementById('goToExpensesBtn').addEventListener('click', () => {
            navegarA('gastos', JSON.parse(sessionStorage.getItem('usuario_actual') || '{}'));
        });

        document.getElementById('goToReportsBtn').addEventListener('click', () => {
            navegarA('informes', JSON.parse(sessionStorage.getItem('usuario_actual') || '{}'));
        });

        document.getElementById('goToAdminBtn').addEventListener('click', () => {
            navegarA('admin', JSON.parse(sessionStorage.getItem('usuario_actual') || '{}'));
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Estas seguro de cerrar sesion?')) {
                sessionStorage.clear();
                localStorage.removeItem('github_token');
                localStorage.removeItem('jac_access_token');
                window.location.reload();
            }
        });

        // Verificar si ya hay sesion activa
        (function verificarSesionActiva() {
            try {
                const usuarioActual = sessionStorage.getItem('usuario_actual');
                if (usuarioActual) {
                    const usuario = JSON.parse(usuarioActual);
                    const token = sessionStorage.getItem('session_token');
                    if (token) {
                        mostrarMenu(usuario);
                    } else {
                        sessionStorage.clear();
                    }
                }
            } catch (e) {
                sessionStorage.clear();
            }
        })();
    </script>
</body>

</html>
