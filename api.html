<body>
    <div class="container">
        <h1>🔐 Administrador de Tokens JAC Bateas</h1>





        <div class="form-group">
            <label>👤 Nombre del Usuario:</label>
            <input type="text" id="usuarioNombre" placeholder="Ej: Juan Pérez, María García...">

            <div class="form-group">
                <label>⏰ Fecha de Expiración:</label>
                <input type="date" id="fechaExpiracion" value="<?php echo date('Y-m-d', strtotime('+3 days')); ?>">
            </div>
        </div>

        <div style="text-align: center; margin: 30px 0;">
            <button class="btn" onclick="generarToken()">🔄 Generar Token Personalizado</button>
            <button class="btn btn-secondary" onclick="generarTokenRapido()">⚡ Generar Rápido (3 días)</button>
        </div>

        <h2>📊 Estadísticas</h2>
        <div class="stats-summary" id="statsSummary">
            <div class="stat-item">
                <div class="number" id="totalTokens">0</div>
                <div class="label">Total Tokens</div>
            </div>
            <div class="stat-item">
                <div class="number" id="activosTokens">0</div>
                <div class="label">Activos</div>
            </div>
            <div class="stat-item">
                <div class="number" id="futurosTokens">0</div>
                <div class="label">Futuros</div>
            </div>
        </div>

        <h2>📋 Lista de Tokens</h2>

        <div class="filtros">
            <button class="filtro-btn active" onclick="filtrarTokens('todos')" id="filtroTodos">📋 Todos</button>
            <button class="filtro-btn" onclick="filtrarTokens('activos')" id="filtroActivos">✅ Activos</button>
            <button class="filtro-btn" onclick="filtrarTokens('futuros')" id="filtroFuturos">⏳ Futuros</button>
            <button class="filtro-btn" onclick="filtrarTokens('expirados')" id="filtroExpirados">❌ Expirados</button>
        </div>

        <div id="tokensContainer" class="tokens-grid">
            <!-- Los tokens se cargarán aquí -->
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 30px;">
            <button class="btn btn-danger" onclick="limpiarExpirados()">🗑️ Limpiar Tokens Expirados</button>
            <button class="btn btn-secondary" onclick="exportarTokens()">📥 Exportar Tokens</button>
        </div>
    </div>

    <script>
        const TOKENS_DB = 'tokens_jacbateas';
        let filtroActual = 'todos';

        function generarToken() {
            const usuario = document.getElementById('usuarioNombre').value.trim() || 'Usuario';
            const fechaInicio = document.getElementById('fechaInicio').value;
            const fechaExpiracion = document.getElementById('fechaExpiracion').value;

            if (!fechaInicio || !fechaExpiracion) {
                alert('❌ Debes seleccionar ambas fechas');
                return;
            }

            const fechaInicioObj = new Date(fechaInicio);
            const fechaExpiracionObj = new Date(fechaExpiracion);
            const ahora = new Date();

            // Validar fechas
            if (fechaExpiracionObj <= fechaInicioObj) {
                alert('❌ La fecha de expiración debe ser posterior a la fecha de inicio');
                return;
            }

            // Generar token aleatorio de 32 caracteres
            const caracteres = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let token = '';

            for (let i = 0; i < 32; i++) {
                token += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
            }

            // Determinar estado inicial
            let estado = 'futuro';
            if (fechaInicioObj <= ahora && fechaExpiracionObj > ahora) {
                estado = 'activo';
            } else if (fechaExpiracionObj <= ahora) {
                estado = 'expirado';
            }

            // Guardar token
            const tokenData = {
                token: token,
                usuario: usuario,
                fechaInicio: fechaInicioObj.toISOString(),
                fechaExpiracion: fechaExpiracionObj.toISOString(),
                creado: new Date().toISOString(),
                estado: estado
            };

            guardarToken(tokenData);
            actualizarListaTokens();
            mostrarNotificacion('✅ Token generado exitosamente');
        }

        function generarTokenRapido() {
            // Generar token con 3 días de validez desde hoy
            const hoy = new Date();
            const expiracion = new Date();
            expiracion.setDate(expiracion.getDate() + 3);

            document.getElementById('fechaInicio').value = hoy.toISOString().split('T')[0];
            document.getElementById('fechaExpiracion').value = expiracion.toISOString().split('T')[0];
            generarToken();
        }

        function guardarToken(tokenData) {
            let tokens = JSON.parse(localStorage.getItem(TOKENS_DB) || '[]');
            tokens.push(tokenData);
            localStorage.setItem(TOKENS_DB, JSON.stringify(tokens));
        }

        function eliminarToken(index) {
            if (confirm('¿Estás seguro de eliminar este token?')) {
                let tokens = JSON.parse(localStorage.getItem(TOKENS_DB) || '[]');
                tokens.splice(index, 1);
                localStorage.setItem(TOKENS_DB, JSON.stringify(tokens));
                actualizarListaTokens();
                mostrarNotificacion('🗑️ Token eliminado');
            }
        }

        function copiarToken(token) {
            navigator.clipboard.writeText(token).then(() => {
                mostrarNotificacion('📋 Token copiado al portapapeles');
            });
        }

        function filtrarTokens(filtro) {
            filtroActual = filtro;

            // Actualizar botones
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById(`filtro${filtro.charAt(0).toUpperCase() + filtro.slice(1)}`).classList.add('active');

            actualizarListaTokens();
        }

        function limpiarExpirados() {
            let tokens = JSON.parse(localStorage.getItem(TOKENS_DB) || '[]');
            const ahora = new Date();
            tokens = tokens.filter(token => new Date(token.fechaExpiracion) > ahora);
            localStorage.setItem(TOKENS_DB, JSON.stringify(tokens));
            actualizarListaTokens();
            mostrarNotificacion('🧹 Tokens expirados eliminados');
        }

        function exportarTokens() {
            let tokens = JSON.parse(localStorage.getItem(TOKENS_DB) || '[]');
            const dataStr = JSON.stringify(tokens, null, 2);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);

            const exportFileDefaultName = `tokens_${new Date().toISOString().split('T')[0]}.json`;

            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();

            mostrarNotificacion('📥 Tokens exportados');
        }

        function mostrarNotificacion(mensaje) {
            // Crear notificación temporal
            const notificacion = document.createElement('div');
            notificacion.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #1a4a2a;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 10000;
                animation: slideIn 0.3s ease;
            `;
            notificacion.textContent = mensaje;
            document.body.appendChild(notificacion);

            setTimeout(() => {
                notificacion.remove();
            }, 3000);
        }

        function actualizarEstadoTokens() {
            let tokens = JSON.parse(localStorage.getItem(TOKENS_DB) || '[]');
            const ahora = new Date();
            let modificado = false;

            tokens = tokens.map(token => {
                const fechaInicio = new Date(token.fechaInicio);
                const fechaExpiracion = new Date(token.fechaExpiracion);

                let nuevoEstado = token.estado;
                if (fechaInicio > ahora) {
                    nuevoEstado = 'futuro';
                } else if (fechaExpiracion <= ahora) {
                    nuevoEstado = 'expirado';
                } else {
                    nuevoEstado = 'activo';
                }

                if (nuevoEstado !== token.estado) {
                    modificado = true;
                    token.estado = nuevoEstado;
                }
                return token;
            });

            if (modificado) {
                localStorage.setItem(TOKENS_DB, JSON.stringify(tokens));
            }

            return tokens;
        }

        function actualizarEstadisticas(tokens) {
            const ahora = new Date();
            const total = tokens.length;
            const activos = tokens.filter(t => new Date(t.fechaInicio) <= ahora && new Date(t.fechaExpiracion) > ahora).length;
            const futuros = tokens.filter(t => new Date(t.fechaInicio) > ahora).length;
            const expirados = tokens.filter(t => new Date(t.fechaExpiracion) <= ahora).length;

            document.getElementById('totalTokens').textContent = total;
            document.getElementById('activosTokens').textContent = activos;
            document.getElementById('futurosTokens').textContent = futuros;
        }

        function calcularDiasRestantes(fechaExpiracion) {
            const hoy = new Date();
            const exp = new Date(fechaExpiracion);
            const diff = exp - hoy;
            const dias = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return dias;
        }

        function calcularPorcentajeVida(fechaInicio, fechaExpiracion) {
            const inicio = new Date(fechaInicio);
            const exp = new Date(fechaExpiracion);
            const ahora = new Date();

            const total = exp - inicio;
            const transcurrido = ahora - inicio;
            const porcentaje = (transcurrido / total) * 100;

            return Math.min(100, Math.max(0, porcentaje));
        }

        function actualizarListaTokens() {
            let tokens = actualizarEstadoTokens();
            const contenedor = document.getElementById('tokensContainer');
            const ahora = new Date();

            actualizarEstadisticas(tokens);

            // Filtrar según selección
            let tokensFiltrados = tokens;
            if (filtroActual === 'activos') {
                tokensFiltrados = tokens.filter(t => t.estado === 'activo');
            } else if (filtroActual === 'futuros') {
                tokensFiltrados = tokens.filter(t => t.estado === 'futuro');
            } else if (filtroActual === 'expirados') {
                tokensFiltrados = tokens.filter(t => t.estado === 'expirado');
            }

            // Ordenar: activos primero, luego futuros, luego expirados
            tokensFiltrados.sort((a, b) => {
                const orden = { 'activo': 0, 'futuro': 1, 'expirado': 2 };
                return orden[a.estado] - orden[b.estado] || new Date(b.fechaInicio) - new Date(a.fechaInicio);
            });

            if (tokensFiltrados.length === 0) {
                contenedor.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 60px; color: #666; background: #f8f8f8; border-radius: 10px;">📭 No hay tokens para mostrar</div>';
                return;
            }

            let html = '';
            tokensFiltrados.forEach((token, index) => {
                const fechaInicio = new Date(token.fechaInicio).toLocaleString('es-ES', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const fechaExpiracion = new Date(token.fechaExpiracion).toLocaleString('es-ES', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });

                const diasRestantes = calcularDiasRestantes(token.fechaExpiracion);
                const porcentajeVida = calcularPorcentajeVida(token.fechaInicio, token.fechaExpiracion);

                let estadoClass = '';
                let estadoTexto = '';
                let estadoColor = '';

                switch (token.estado) {
                    case 'activo':
                        estadoClass = 'activo';
                        estadoTexto = '✓ ACTIVO';
                        estadoColor = '#2a8e5a';
                        break;
                    case 'futuro':
                        estadoClass = 'future';
                        estadoTexto = '⏳ FUTURO';
                        estadoColor = '#ffaa00';
                        break;
                    case 'expirado':
                        estadoClass = 'inactive';
                        estadoTexto = '✗ EXPIRADO';
                        estadoColor = '#c04040';
                        break;
                }

                const tokenIndex = tokens.findIndex(t => t.token === token.token);

                html += `
                    <div class="token-card ${token.estado}">
                        <button class="delete-btn" onclick="eliminarToken(${tokenIndex})" title="Eliminar token">✖</button>
                        
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <span class="estado ${estadoClass}">${estadoTexto}</span>
                            <span style="background: #f0f0f0; padding: 4px 8px; border-radius: 12px; font-size: 0.7rem;">
                                👤 ${token.usuario}
                            </span>
                        </div>
                        
                        <div class="token-value">${token.token}</div>
                        
                        <div class="fecha">
                            <span>📅 Inicio:</span> ${fechaInicio}
                        </div>
                        <div class="fecha">
                            <span>⏰ Expira:</span> ${fechaExpiracion}
                        </div>
                        
                        ${token.estado === 'activo' ? `
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${porcentajeVida}%;"></div>
                            </div>
                            <div style="display: flex; justify-content: space-between; font-size: 0.7rem;">
                                <span>⏳ ${diasRestantes} días restantes</span>
                                <span>${Math.round(porcentajeVida)}%</span>
                            </div>
                        ` : token.estado === 'futuro' ? `
                            <div style="background: #fff8e0; padding: 8px; border-radius: 5px; margin-top: 10px; font-size: 0.7rem; text-align: center;">
                                ⏳ Inicia en ${Math.ceil((new Date(token.fechaInicio) - ahora) / (1000 * 60 * 60 * 24))} días
                            </div>
                        ` : `
                            <div style="background: #ffe4e4; padding: 8px; border-radius: 5px; margin-top: 10px; font-size: 0.7rem; text-align: center;">
                                ⌛ Expirado hace ${Math.ceil((ahora - new Date(token.fechaExpiracion)) / (1000 * 60 * 60 * 24))} días
                            </div>
                        `}
                        
                        ${token.estado !== 'expirado' ? `
                            <div class="action-buttons">
                                <button class="btn-copy" onclick="copiarToken('${token.token}')" style="background: #4a90e2; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer;">
                                    📋 Copiar Token
                                </button>
                            </div>
                        ` : ''}
                    </div>
                `;
            });

            contenedor.innerHTML = html;
        }

        // Establecer fechas por defecto (hoy y hoy + 3 días)
        document.addEventListener('DOMContentLoaded', () => {
            const hoy = new Date();
            const expiracion = new Date();
            expiracion.setDate(expiracion.getDate() + 3);

            document.getElementById('fechaInicio').value = hoy.toISOString().split('T')[0];
            document.getElementById('fechaExpiracion').value = expiracion.toISOString().split('T')[0];

            actualizarListaTokens();
        });

        // Agregar animación CSS
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
