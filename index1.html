<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAC Bateas · Inicio de Sesión</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #2a5a2a 0%, #1e4a1e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .login-card {
            background: white;
            border-radius: 32px;
            padding: 40px 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 20, 0, 0.5);
            border: 1px solid #a0c0a0;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: #e6f0e6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            border: 2px solid #4c8c4c;
        }

        h1 {
            font-size: 1.8rem;
            color: #1a4a2a;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .subtitle {
            color: #4a6b4a;
            font-size: 0.9rem;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #1a4a2a;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #d0e4d0;
            border-radius: 16px;
            font-size: 0.95rem;
            transition: all 0.15s;
            background: #f8fff8;
        }

        .input-group input:focus {
            border-color: #2a7a4a;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(42, 122, 74, 0.1);
        }

        .btn-login {
            background: #1a4a2a;
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 16px;
        }

        .btn-login:hover {
            background: #2a6a3a;
        }

        .btn-login:disabled {
            background: #a0c0a0;
            cursor: not-allowed;
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-error {
            background: #ffe4e4;
            color: #8a2a2a;
            border-left: 6px solid #c04040;
        }

        .alert-success {
            background: #e4ffe4;
            color: #1a4a2a;
            border-left: 6px solid #2a8e5a;
        }

        .alert-info {
            background: #e4f0ff;
            color: #2a4a6a;
            border-left: 6px solid #4a8ac0;
        }

        .footer {
            margin-top: 24px;
            color: #6a8b6a;
            font-size: 0.65rem;
            font-weight: 500;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== MENÚ DE SELECCIÓN ===== */
        .menu-card {
            display: none;
        }

        .menu-card.show {
            display: block;
        }

        .login-card.hidden {
            display: none;
        }

        .menu-title {
            font-size: 1.2rem;
            color: #1a4a2a;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .menu-user {
            color: #4a6b4a;
            font-size: 0.85rem;
            margin-bottom: 24px;
            background: #f0f8f0;
            padding: 10px 16px;
            border-radius: 12px;
            display: inline-block;
        }

        .menu-user span {
            font-weight: 700;
            color: #1a4a2a;
        }

        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 8px;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 18px 20px;
            border-radius: 16px;
            border: 2px solid #d0e4d0;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-size: 0.95rem;
            font-weight: 600;
            color: #1a4a2a;
        }

        .menu-btn:hover {
            background: #f0f8f0;
            border-color: #4c8c4c;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 40, 0, 0.1);
        }

        .menu-btn .icon {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .menu-btn .icon.treasury {
            background: #e6f0e6;
        }

        .menu-btn .icon.expenses {
            background: #ffe4e4;
        }

        .menu-btn .icon.reports {
            background: #e4f0ff;
        }

        .menu-btn .icon.admin {
            background: #fff9e6;
        }

        .menu-btn .info {
            flex: 1;
        }

        .menu-btn .info .name {
            font-size: 1rem;
            font-weight: 700;
            color: #1a4a2a;
        }

        .menu-btn .info .desc {
            font-size: 0.7rem;
            color: #6a8b6a;
            margin-top: 2px;
            font-weight: 500;
        }

        .menu-btn .arrow {
            font-size: 1.2rem;
            color: #a0c0a0;
            font-weight: 400;
        }

        .btn-logout {
            background: none;
            border: 1px solid #d0e4d0;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8a6b6b;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            transition: all 0.15s;
        }

        .btn-logout:hover {
            background: #f5f0f0;
            border-color: #c0a0a0;
            color: #6b2020;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- TARJETA DE LOGIN -->
        <div class="login-card" id="loginCard">
            <div class="logo">🌿</div>
            <h1>JAC Bateas</h1>
            <div class="subtitle">
                Sistema de Recaudo · Barrio Bateas Sector 3<br>
                Puerto Gaitán, Meta
            </div>

            <div id="alertMessage" class="alert"></div>

            <div class="input-group">
                <label>USUARIO</label>
                <input type="password" id="username" placeholder="Ingresa tu usuario" autocomplete="off" value="">
            </div>

            <div class="input-group">
                <label>CONTRASEÑA</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña" value="">
            </div>

            <button id="loginBtn" class="btn-login">Iniciar sesión</button>

            <div class="footer">
                <span>Junta de Acción Comunal · 2026</span>
            </div>
        </div>

        <!-- TARJETA DE MENÚ -->
        <div class="login-card menu-card" id="menuCard">
            <div class="logo">🌿</div>
            <h1 class="menu-title">JAC Bateas</h1>
            <div class="menu-user">
                👤 Sesión: <span id="menuUsername"></span> |
                🔰 Rol: <span id="menuRol"></span>
            </div>

            <div class="menu-options">
                <!-- Tesorería (Recaudos) -->
                <button class="menu-btn" id="goToTreasuryBtn">
                    <div class="icon treasury">💰</div>
                    <div class="info">
                        <div class="name">Tesorería · Recaudos</div>
                        <div class="desc">Registrar pagos de cuotas y certificados</div>
                    </div>
                    <div class="arrow">→</div>
                </button>

                <!-- Gastos -->
                <button class="menu-btn" id="goToExpensesBtn">
                    <div class="icon expenses">💸</div>
                    <div class="info">
                        <div class="name">Control de Gastos</div>
                        <div class="desc">Registrar y controlar los gastos de la JAC</div>
                    </div>
                    <div class="arrow">→</div>
                </button>

                <!-- Informes (opcional, para futuros roles) -->
                <button class="menu-btn" id="goToReportsBtn" style="display: none;">
                    <div class="icon reports">📊</div>
                    <div class="info">
                        <div class="name">Informes</div>
                        <div class="desc">Ver reportes y estadísticas</div>
                    </div>
                    <div class="arrow">→</div>
                </button>

                <!-- Panel de Administración (solo admin) -->
                <button class="menu-btn" id="goToAdminBtn" style="display: none;">
                    <div class="icon admin">⚙️</div>
                    <div class="info">
                        <div class="name">Administración</div>
                        <div class="desc">Gestionar tokens, usuarios y configuración</div>
                    </div>
                    <div class="arrow">→</div>
                </button>
            </div>

            <button class="btn-logout" id="logoutBtn">🚪 Cerrar sesión</button>

            <div class="footer">
                <span>Junta de Acción Comunal · 2026</span>
            </div>
        </div>
    </div>

    <script>
        // Configuración
        const USUARIOS_URL = "https://raw.githubusercontent.com/carlos2601/juntadeaccioncomunalbarriobateaspuertogaitanmetalilianalondo-ogallego1010101010101000111010001010010/refs/heads/main/usuarios.json"

        // Elementos DOM
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const alertMessage = document.getElementById('alertMessage');
        const loginCard = document.getElementById('loginCard');
        const menuCard = document.getElementById('menuCard');
        const menuUsername = document.getElementById('menuUsername');
        const menuRol = document.getElementById('menuRol');

        // Mostrar alertas
        function mostrarAlerta(mensaje, tipo = 'error') {
            alertMessage.textContent = mensaje;
            alertMessage.className = `alert show alert-${tipo}`;
            setTimeout(() => {
                alertMessage.classList.remove('show');
            }, 5000);
        }

        // Validar credenciales contra GitHub
        async function validarUsuario(username, password) {
            try {
                // Mostrar loading
                loginBtn.innerHTML = '<span class="loading"></span> Verificando...';
                loginBtn.disabled = true;

                // Obtener usuarios desde GitHub
                const response = await fetch(USUARIOS_URL);

                if (!response.ok) {
                    throw new Error('No se pudo conectar con el servidor');
                }

                const data = await response.json();

                // Verificar la estructura del JSON
                console.log('Datos recibidos:', data);

                // Asegurarse de que data.usuarios existe y es un array
                if (!data || !data.usuarios || !Array.isArray(data.usuarios)) {
                    console.error('Estructura de datos inválida:', data);
                    throw new Error('Error en la estructura de datos de usuarios');
                }

                // Buscar usuario que coincida
                const usuario = data.usuarios.find(u => {
                    if (!u || typeof u.usuario !== 'string' || typeof u.password !== 'string') {
                        return false;
                    }
                    return u.usuario.toLowerCase() === username.toLowerCase() &&
                        u.password === password &&
                        u.activo === true;
                });

                if (!usuario) {
                    throw new Error('Usuario o contraseña incorrectos');
                }

                return usuario;

            } catch (error) {
                throw error;
            } finally {
                // Restaurar botón
                loginBtn.innerHTML = 'Iniciar sesión';
                loginBtn.disabled = false;
            }
        }

        // Mostrar menú de selección
        function mostrarMenu(usuario) {
            // Ocultar login, mostrar menú
            loginCard.classList.add('hidden');
            menuCard.classList.add('show');

            // Mostrar información del usuario
            menuUsername.textContent = usuario.usuario;
            menuRol.textContent = usuario.rol.charAt(0).toUpperCase() + usuario.rol.slice(1);

            // Configurar visibilidad según rol
            const goToTreasuryBtn = document.getElementById('goToTreasuryBtn');
            const goToExpensesBtn = document.getElementById('goToExpensesBtn');
            const goToReportsBtn = document.getElementById('goToReportsBtn');
            const goToAdminBtn = document.getElementById('goToAdminBtn');

            // Tesorería: visible para todos excepto revisor
            if (usuario.rol === 'revisor' || (usuario.permisos && usuario.permisos.solo_informes)) {
                goToTreasuryBtn.style.display = 'none';
                goToExpensesBtn.style.display = 'none';
                goToReportsBtn.style.display = 'flex';
            } else {
                goToTreasuryBtn.style.display = 'flex';
                goToExpensesBtn.style.display = 'flex';
                goToReportsBtn.style.display = 'none';
            }

            // Admin: solo si es admin
            if (usuario.rol === 'admin') {
                goToAdminBtn.style.display = 'flex';
            }
        }

        // Navegar a un módulo
        function navegarA(modulo, usuario) {
            const sessionToken = sessionStorage.getItem('session_token');
            let url = '';

            switch (modulo) {
                case 'tesoreria':
                    if (usuario.rol === 'tesorera') {
                        url = `tesoreria.html?mode=full&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    } else {
                        url = `tesoreria.html?mode=readonly&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    }
                    break;

                case 'gastos':
                    // Todos los que no son revisor pueden registrar gastos
                    url = `gastos.html?mode=full&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    break;

                case 'informes':
                    url = `informes.html?mode=readonly&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    break;

                case 'admin':
                    url = `admin.html?user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
                    break;

                default:
                    url = `tesoreria.html?mode=full&user=${encodeURIComponent(usuario.usuario)}&token=${sessionToken}`;
            }

            window.location.href = url;
        }

        // Redirigir según rol y permisos (método directo sin menú)
        function redirigirSegunRol(usuario) {
            // Guardar información del usuario en sessionStorage
            sessionStorage.setItem('usuario_actual', JSON.stringify({
                usuario: usuario.usuario,
                rol: usuario.rol,
                permisos: usuario.permisos,
                activo: usuario.activo,
                fecha_registro: usuario.fecha_registro
            }));

            // Crear token de sesión
            const sessionToken = btoa(`${usuario.usuario}:${Date.now()}`);
            sessionStorage.setItem('session_token', sessionToken);

            // Mostrar mensaje de éxito
            mostrarAlerta(`¡Bienvenido ${usuario.usuario}!`, 'success');

            // Mostrar menú de selección
            setTimeout(() => {
                mostrarMenu(usuario);
            }, 500);
        }

        // Evento de login
        loginBtn.addEventListener('click', async (e) => {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                mostrarAlerta('Por favor ingresa usuario y contraseña', 'error');
                return;
            }

            try {
                const usuario = await validarUsuario(username, password);
                redirigirSegunRol(usuario);
            } catch (error) {
                mostrarAlerta(error.message, 'error');
            }
        });

        // Permitir login con Enter
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginBtn.click();
            }
        });

        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                passwordInput.focus();
            }
        });

        // Eventos de botones del menú
        document.getElementById('goToTreasuryBtn').addEventListener('click', () => {
            const usuarioActual = JSON.parse(sessionStorage.getItem('usuario_actual') || '{}');
            navegarA('tesoreria', usuarioActual);
        });

        document.getElementById('goToExpensesBtn').addEventListener('click', () => {
            const usuarioActual = JSON.parse(sessionStorage.getItem('usuario_actual') || '{}');
            navegarA('gastos', usuarioActual);
        });

        document.getElementById('goToReportsBtn').addEventListener('click', () => {
            const usuarioActual = JSON.parse(sessionStorage.getItem('usuario_actual') || '{}');
            navegarA('informes', usuarioActual);
        });

        document.getElementById('goToAdminBtn').addEventListener('click', () => {
            const usuarioActual = JSON.parse(sessionStorage.getItem('usuario_actual') || '{}');
            navegarA('admin', usuarioActual);
        });

        // Cerrar sesión desde el menú
        document.getElementById('logoutBtn').addEventListener('click', () => {
            const confirmar = confirm('¿Estás seguro de cerrar sesión?');
            if (confirmar) {
                sessionStorage.clear();
                localStorage.removeItem('github_token');
                localStorage.removeItem('jac_access_token');
                window.location.reload();
            }
        });

        // Verificar si ya hay sesión activa
        (function verificarSesionActiva() {
            try {
                const usuarioActual = sessionStorage.getItem('usuario_actual');
                if (usuarioActual) {
                    const usuario = JSON.parse(usuarioActual);

                    // Si hay sesión activa, mostrar directamente el menú
                    // y restaurar el token
                    const token = sessionStorage.getItem('session_token');
                    if (token) {
                        mostrarMenu(usuario);
                    } else {
                        // Si no hay token, limpiar y mostrar login
                        sessionStorage.clear();
                    }
                }
            } catch (e) {
                sessionStorage.clear();
            }
        })();
    </script>
</body>

</html>
